services:
  - type: web
    name: shukatsu-backend
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -e .
    startCommand: uvicorn shukatsu_backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: 就活マネージャー
      - key: MAIL_FROM
        sync: false
      - key: APP_PUBLIC_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SCHEDULER_TIMEZONE
        value: Asia/Tokyo
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
